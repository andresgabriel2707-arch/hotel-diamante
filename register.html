<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro -Diamante macanal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-white">
    <header class="site-header">
        <div class="brand">
            <img src="images/logo.png" alt="Hotel Logo" class="site-logo">
            Diamante <span style="color: var(--primary);">macanal</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Inicio</a>
            <a href="cabanas.html">Cabañas</a>
            <a href="index.html#acerca">Acerca de nosotros</a>
            <span id="nav-greeting" style="display:none; color:var(--primary); font-weight:600; font-size:0.9rem;"></span>
            <a href="login.html" id="nav-login">Login</a>
            <a href="register.html" id="nav-register" class="active">Registro</a>
            <a href="user-dashboard.html" id="nav-mi-cuenta" style="display:none;">Mi cuenta</a>
            <a href="#" id="nav-logout" style="display:none;">Cerrar sesión</a>
        </nav>
    </header>

    <main class="centered-panel">
        <h2>Registro de usuario</h2>
        <p>Regístrate para acceder al sistema y realizar reservas.</p>
        <form id="registerForm" class="form-panel">
            <label>Nombre completo <input type="text" id="registerName" required></label>
            <label>Correo electrónico <input type="email" id="registerEmail" required></label>
            <label>Contraseña <input type="password" id="registerPassword" required></label>
            <label>Edad <input type="number" id="registerAge" min="18" required></label>
            <label>Documento <input type="text" id="registerDocument" required></label>
            <button type="submit" class="btn-primary">Registrar</button>
            <p id="registerMessage" class="message"></p>
        </form>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Diamante macanal. Sistema de gestión hotelera.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
