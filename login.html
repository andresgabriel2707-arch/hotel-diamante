<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diamante macanal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-white">
    <header class="site-header">
        <div class="brand">
            <img src="images/logo.png" alt="Hotel Logo" class="site-logo">
            Diamante <span style="color: var(--primary);">macanal</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Inicio</a>
            <a href="cabanas.html">Cabañas</a>
            <a href="index.html#acerca">Acerca de nosotros</a>
            <span id="nav-greeting" style="display:none; color:var(--primary); font-weight:600; font-size:0.9rem;"></span>
            <a href="login.html" id="nav-login" class="active">Login</a>
            <a href="register.html" id="nav-register">Registro</a>
            <a href="user-dashboard.html" id="nav-mi-cuenta" style="display:none;">Mi cuenta</a>
            <a href="#" id="nav-logout" style="display:none;">Cerrar sesión</a>
        </nav>
    </header>

    <main class="centered-panel">
        <h2>Iniciar sesión</h2>
        <p>Ingresa tu correo y contraseña para acceder.</p>
        <form id="loginForm" class="form-panel">
            <label>Correo electrónico <input type="email" id="loginEmail" required></label>
            <label>Contraseña <input type="password" id="loginPassword" required></label>
            <button type="submit" class="btn-primary">Entrar</button>
            <p style="text-align:center; margin-top:1.5rem; font-size:0.95rem;">
                ¿No tienes cuenta? <a href="register.html" style="color:var(--primary); text-decoration:underline;">Regístrate</a>
            </p>
            <p id="loginMessage" class="message"></p>
        </form>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Diamante macanal. Sistema de gestión hotelera.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
